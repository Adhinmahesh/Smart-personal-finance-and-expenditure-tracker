# ── Nginx Configuration for Smart Finance Tracker ─────────────────
# Serves the React SPA and proxies /api/* to the Flask backend

server {
    listen 80;
    server_name localhost;

    # Root — serve the Vite build output
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ──────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Proxy → Backend (Gunicorn) ────────────────────────────
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for slow queries
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;

        # Cache-busting — never serve stale API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    # ── SPA Fallback ──────────────────────────────────────────────
    # All non-API, non-file routes fall back to index.html
    # so React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
